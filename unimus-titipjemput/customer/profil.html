      <div class="d-flex align-items-center gap-3">
        <button class="sidebar-toggle btn-icon"><i class="bi bi-list fs-5"></i></button>
        <div class="page-title">Profil Saya</div>

        <button class="btn-icon"><i class="bi bi-bell"></i></button>

      </div>

    <div class="content-pad">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card-tm text-center">

              <div class="avatar-chip mx-auto mb-3" style="width:84px;height:84px;font-size:1.8rem;">AR</div>
              <h3 class="h6 mb-0">Aulia Rahma</h3>

            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card-tm">
            <div class="card-body">
              <h3 class="h6 mb-4">Data Diri</h3>
              <form>
                <div class="row g-3 mb-3">
                  <div class="col-md-6"><label class="form-label">Nama Lengkap</label><input type="text" class="form-control" value="Aulia Rahma"></div>

                </div>

                  <div class="col-md-6"><label class="form-label">No. WhatsApp</label><input type="tel" class="form-control" value="0812-3456-7890"></div>
                  <div class="col-md-6"><label class="form-label">Alamat Kos</label><input type="text" class="form-control" value="Griya Asri, Kedungmundu"></div>
                </div>
                <button type="submit" class="btn btn-brand">Simpan Perubahan</button>
              </form>
            </div>
          </div>

          <div class="card-tm mt-4">
            <div class="card-body">
              <h3 class="h6 mb-3">Keamanan Akun</h3>
              <form class="row g-3">
                <div class="col-md-6"><label class="form-label">Kata Sandi Baru</label><input type="password" class="form-control" placeholder="Minimal 8 karakter"></div>
                <div class="col-md-6"><label class="form-label">Ulangi Kata Sandi</label><input type="password" class="form-control" placeholder="Ulangi kata sandi baru"></div>
                <div class="col-12"><button type="submit" class="btn btn-outline-brand">Perbarui Kata Sandi</button></div>
              </form>
            </div>
          </div>
        </div>
      </div>
