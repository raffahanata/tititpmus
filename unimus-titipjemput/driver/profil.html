<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil & Kendaraan — Driver TitipMus</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
<div class="dash-shell">
  <div class="sidebar-backdrop"></div>
  <aside class="sidebar theme-driver">
    <div class="side-brand"><span class="mark">T</span><div class="fw-bold text-white" style="font-family:var(--font-display);">TitipMus</div></div>
    <div class="side-role">Akun Driver</div>
    <nav>
      <div class="nav-section">Menu Utama</div>
      <a href="dashboard.html" class="side-link"><span class="ic"><i class="bi bi-grid-1x2-fill"></i></span> Dashboard</a>
      <a href="pesanan.html" class="side-link"><span class="ic"><i class="bi bi-signpost-split-fill"></i></span> Kelola Pesanan</a>
      <a href="riwayat.html" class="side-link"><span class="ic"><i class="bi bi-clock-history"></i></span> Riwayat Antar</a>
      <div class="nav-section">Akun</div>
      <a href="profil.html" class="side-link active"><span class="ic"><i class="bi bi-person-circle"></i></span> Profil & Kendaraan</a>
      <a href="../auth/login.html" class="side-link"><span class="ic"><i class="bi bi-box-arrow-right"></i></span> Keluar</a>
    </nav>
    <div class="side-foot text-white-50">Masuk sebagai<br><span class="text-white fw-semibold">Rangga Pratama</span></div>
  </aside>

  <div class="main-col">
    <div class="topbar">
      <div class="d-flex align-items-center gap-3">
        <button class="sidebar-toggle btn-icon"><i class="bi bi-list fs-5"></i></button>
        <div class="page-title">Profil & Kendaraan</div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <button class="btn-icon"><i class="bi bi-bell"></i></button>
        <div class="avatar-chip">RP</div>
      </div>
    </div>

    <div class="content-pad">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card-tm text-center">
            <div class="card-body">
              <div class="avatar-chip mx-auto mb-3" style="width:84px;height:84px;font-size:1.8rem; background:var(--color-driver-light); color:var(--color-driver-dark);">RP</div>
              <h3 class="h6 mb-0">Rangga Pratama</h3>
              <p class="text-secondary small mb-3">NIM 30202190xx · Teknik Informatika</p>
              <span class="badge-status badge-done"><i class="bi bi-patch-check-fill me-1"></i>Driver Terverifikasi</span>
              <hr class="my-4">
              <button class="btn btn-outline-brand btn-sm w-100 mb-2">Ganti Foto Profil</button>
              <a href="../auth/login.html" class="btn btn-danger-soft w-100">Keluar Akun</a>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="card-tm mb-4">
            <div class="card-body">
              <h3 class="h6 mb-4">Data Diri</h3>
              <form class="row g-3">
                <div class="col-md-6"><label class="form-label">Nama Lengkap</label><input type="text" class="form-control" value="Rangga Pratama"></div>
                <div class="col-md-6"><label class="form-label">NIM</label><input type="text" class="form-control" value="3020219012"></div>
                <div class="col-md-6"><label class="form-label">No. WhatsApp</label><input type="tel" class="form-control" value="0813-2233-4455"></div>
                <div class="col-md-6"><label class="form-label">Rekening / E-Wallet Pencairan</label><input type="text" class="form-control" value="DANA — 0813-2233-4455"></div>
                <div class="col-12"><button type="submit" class="btn btn-driver">Simpan Perubahan</button></div>
              </form>
            </div>
          </div>

          <div class="card-tm">
            <div class="card-body">
              <h3 class="h6 mb-4">Data Kendaraan</h3>
              <form class="row g-3">
                <div class="col-md-6"><label class="form-label">Jenis Kendaraan</label>
                  <select class="form-select"><option>Sepeda Motor</option><option>Sepeda</option></select>
                </div>
                <div class="col-md-6"><label class="form-label">Plat Nomor</label><input type="text" class="form-control" value="H 1234 XYZ"></div>
                <div class="col-md-6"><label class="form-label">Unggah SIM</label><input type="file" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Unggah STNK</label><input type="file" class="form-control"></div>
                <div class="col-12"><button type="submit" class="btn btn-outline-brand">Perbarui Data Kendaraan</button></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/script.js"></script>
</body>
</html>
